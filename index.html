<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA (TOTP) Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap');
        .otp-font { font-family: 'JetBrains+Mono', monospace; }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">2FA Authenticator</h1>

        <!-- Secret Key Input -->
        <div class="mb-6">
            <label for="secret" class="block text-sm font-medium text-slate-600 mb-2">Secret Key (Base32)</label>
            <input type="text" id="secret" placeholder="例: JBSW Y3DP EHPK 3PXP" 
                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none uppercase tracking-wider text-center font-mono">
            <p class="mt-2 text-xs text-slate-400">※ Base32形式のシークレットキーを入力してください</p>
        </div>

        <!-- OTP Display Area -->
        <div class="relative bg-slate-900 rounded-xl p-8 flex flex-col items-center justify-center overflow-hidden">
            <div id="otp-display" class="otp-font text-5xl font-bold text-blue-400 tracking-[0.2em] mb-2 z-10">000 000</div>
            <div id="status-text" class="text-slate-400 text-xs uppercase tracking-widest z-10">Valid for <span id="seconds-left">30</span>s</div>
            
            <!-- Background Progress Circle -->
            <svg class="absolute opacity-10" width="200" height="200">
                <circle class="progress-ring__circle" stroke="white" stroke-width="8" fill="transparent" r="90" cx="100" cy="100" id="progress-circle"/>
            </svg>
        </div>

        <!-- Additional Info -->
        <div class="mt-8 space-y-4">
            <div class="p-3 bg-blue-50 rounded-lg border border-blue-100">
                <p class="text-xs text-blue-700 font-semibold mb-1">OTPAuth URL (Config):</p>
                <div id="otpauth-url" class="text-[10px] text-blue-600 break-all font-mono"></div>
            </div>
            
            <button onclick="copyOTP()" class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-lg font-semibold transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                Copy Passcode
            </button>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-2 rounded-full text-sm opacity-0 transition-opacity pointer-events-none">
        Copied to clipboard!
    </div>

    <!-- TOTP Implementation Logic -->
    <script>
        /**
         * TOTP Implementation based on RFC 6238 and RFC 4226
         */

        // Base32 lookup table
        const base32chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';

        function base32tohex(base32) {
            let bits = "";
            let hex = "";
            base32 = base32.replace(/\s/g, '').toUpperCase();
            
            for (let i = 0; i < base32.length; i++) {
                let val = base32chars.indexOf(base32.charAt(i));
                if (val === -1) continue;
                bits += val.toString(2).padStart(5, '0');
            }

            for (let i = 0; i + 4 <= bits.length; i += 4) {
                let chunk = bits.substr(i, 4);
                hex = hex + parseInt(chunk, 2).toString(16);
            }
            return hex;
        }

        async function hmac_sha1(keyHex, messageHex) {
            // Convert hex to bytes
            const keyBytes = Uint8Array.from(keyHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            const messageBytes = Uint8Array.from(messageHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));

            // Import key
            const cryptoKey = await window.crypto.subtle.importKey(
                "raw",
                keyBytes,
                { name: "HMAC", hash: { name: "SHA-1" } },
                false,
                ["sign"]
            );

            // Sign
            const signature = await window.crypto.subtle.sign("HMAC", cryptoKey, messageBytes);
            return Array.from(new Uint8Array(signature)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function generateTOTP() {
            const secret = document.getElementById('secret').value;
            if (!secret) return "000000";

            try {
                const key = base32tohex(secret);
                const epoch = Math.floor(Date.now() / 1000.0);
                const time = Math.floor(epoch / 30).toString(16).padStart(16, '0');

                const hmac = await hmac_sha1(key, time);
                const offset = parseInt(hmac.substring(hmac.length - 1), 16);
                
                let otp = (parseInt(hmac.substr(offset * 2, 8), 16) & 0x7fffffff) + "";
                otp = otp.substr(otp.length - 6, 6).padStart(6, '0');
                
                return otp;
            } catch (e) {
                console.error(e);
                return "ERR!!";
            }
        }

        // UI Update Loop
        const circle = document.getElementById('progress-circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            circle.style.strokeDashoffset = offset;
        }

        async function updateUI() {
            const otp = await generateTOTP();
            const display = document.getElementById('otp-display');
            display.innerText = otp.slice(0, 3) + ' ' + otp.slice(3);

            const epoch = Math.floor(Date.now() / 1000.0);
            const seconds = 30 - (epoch % 30);
            document.getElementById('seconds-left').innerText = seconds;
            
            const percent = (seconds / 30) * 100;
            setProgress(percent);

            // Update URL info
            const secret = document.getElementById('secret').value.replace(/\s/g, '');
            document.getElementById('otpauth-url').innerText = `otpauth://totp/Demo:User?secret=${secret}&issuer=Demo`;
        }

        function copyOTP() {
            const text = document.getElementById('otp-display').innerText.replace(/\s/g, '');
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);

            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }
        // Initialize
        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
