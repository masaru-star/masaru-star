<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハエ・サバイバル 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'sans-serif'; }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats-bar {
            width: 200px;
            height: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            overflow: hidden;
        }
        .stats-fill {
            height: 100%;
            transition: width 0.3s ease;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            display: none;
            pointer-events: auto;
            border: 2px solid #ff4444;
            max-width: 90%;
            z-index: 100;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="p-4 flex flex-col gap-2">
            <div>経過時間: <span id="timer-val">0</span>s</div>
            <div class="flex items-center gap-2">
                <span>渇き:</span>
                <div class="stats-bar"><div id="thirst-fill" class="stats-fill bg-blue-500" style="width: 100%"></div></div>
            </div>
            <div class="flex items-center gap-2">
                <span>空腹:</span>
                <div class="stats-bar"><div id="hunger-fill" class="stats-fill bg-green-500" style="width: 100%"></div></div>
            </div>
            <div id="drunk-status" class="hidden text-yellow-400 font-bold">状態: 泥酔中</div>
        </div>

        <div id="game-over">
            <h1 class="text-4xl font-bold text-red-500 mb-4">あなたは死んだ</h1>
            <div id="death-reason" class="text-xl mb-4 text-white"></div>
            <div id="stats-summary" class="text-left bg-gray-800 p-4 rounded mb-4">
                <p>生存時間: <span id="final-time"></span>秒</p>
                <p>接触した小道具: <span id="props-used"></span></p>
            </div>
            <button onclick="location.reload()" class="bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-gray-200 transition">転生する</button>
        </div>

        <div class="absolute bottom-4 left-4 text-sm opacity-70">
            操作: WASD/矢印で移動 | Space/Shiftで上昇下降 | マウスで視点移動
        </div>
    </div>

    <script>
        let scene, camera, renderer, fly;
        let clock = new THREE.Clock();
        let props = [];
        let usedProps = new Set();
        
        // Game State
        let gameState = {
            alive: true,
            timer: 0,
            lastHydrated: 0,
            lastFed: 0,
            isDrunk: 0,
            nearIncense: 0,
            deathReason: "",
            moveSpeed: 0.15,
            rotSpeed: 0.02,
            gracePeriod: 60 // 1 second (at 60fps) to prevent instant death
        };

        // Controls
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Mouse sensitivity
        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body && gameState.alive) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
            }
        });

        document.body.addEventListener('click', () => {
            if (gameState.alive) document.body.requestPointerLock();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x221100); 
            scene.fog = new THREE.Fog(0x221100, 5, 30);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);
            const pointLight = new THREE.PointLight(0xffaa66, 1, 20);
            pointLight.position.set(0, 4, 0);
            pointLight.castShadow = true;
            scene.add(pointLight);

            createRoom();
            setupProps();
            
            // Fly helper
            fly = new THREE.Group();
            // Start at a safer position (corner of the room, away from candle/table)
            fly.position.set(7, 2, 7); 
            scene.add(fly);

            animate();
        }

        function createRoom() {
            // Floor
            const floorGeo = new THREE.PlaneGeometry(20, 20);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x332211 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Walls
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x554433 });
            for(let i=0; i<4; i++) {
                const wall = new THREE.Mesh(new THREE.PlaneGeometry(20, 8), wallMat);
                wall.position.y = 4;
                wall.position.z = -10;
                wall.rotation.y = i * Math.PI/2;
                if(i==1) wall.position.set(-10, 4, 0);
                if(i==2) wall.position.set(0, 4, 10);
                if(i==3) wall.position.set(10, 4, 0);
                scene.add(wall);
            }

            // Ceiling
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), wallMat);
            ceil.position.y = 8;
            ceil.rotation.x = Math.PI / 2;
            scene.add(ceil);

            // Table (Center)
            const table = new THREE.Group();
            const top = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 4), new THREE.MeshStandardMaterial({color: 0x442200}));
            top.position.y = 1;
            top.castShadow = true;
            top.receiveShadow = true;
            table.add(top);
            for(let x of [-1.8, 1.8]) for(let z of [-1.8, 1.8]) {
                const leg = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1, 0.1), new THREE.MeshStandardMaterial({color: 0x442200}));
                leg.position.set(x, 0.5, z);
                table.add(leg);
            }
            scene.add(table);
        }

        function setupProps() {
            // Faucet (蛇口)
            addProp("蛇口", 0x888888, new THREE.CylinderGeometry(0.1, 0.1, 0.5), [-5, 2, -9], (dist) => {
                if (gameState.gracePeriod > 0) return;
                if (dist < 0.3) endGame("下水に落ちて溺死しました");
                if (dist < 1.5) gameState.lastHydrated = gameState.timer;
            });

            // Trash (生ごみ)
            addProp("生ごみ置き場", 0x224422, new THREE.BoxGeometry(1, 0.5, 1), [5, 0.25, -5], (dist) => {
                if (dist < 1) {
                    gameState.lastFed = gameState.timer;
                    if (!this.trashTime) this.trashTime = 0;
                    this.trashTime++;
                    if(this.trashTime > 300) endGame("ゴミ箱の蓋が閉まり、閉じ込められました");
                } else {
                    this.trashTime = 0;
                }
            });

            // Candle (蝋燭) - Positioned on the table
            const candle = addProp("蝋燭", 0xffaa00, new THREE.CylinderGeometry(0.05, 0.05, 0.4), [0, 1.3, 0], (dist) => {
                if (gameState.gracePeriod > 0) return;
                if (dist < 0.4) endGame("火に飛び込んで焼死しました");
            });
            const flame = new THREE.PointLight(0xff5500, 1, 2);
            flame.position.y = 0.3;
            candle.add(flame);

            // Clock (壁掛け時計)
            addProp("壁掛け時計", 0xffffff, new THREE.CircleGeometry(0.5, 32), [0, 5, -9.9], (dist) => {
                if (dist < 0.8) {
                    gameState.timer = Math.max(0, gameState.timer - 20);
                }
            });

            // Glass (グラス) - Positioned on the table
            addProp("グラス", 0xaaaaff, new THREE.CylinderGeometry(0.2, 0.15, 0.4, 16), [1, 1.3, 1], (dist) => {
                if (dist < 0.4) {
                    gameState.isDrunk = 300; 
                }
            }, true);

            // Incense (線香)
            addProp("線香", 0x443322, new THREE.CylinderGeometry(0.01, 0.01, 0.6), [-2, 0.3, 2], (dist) => {
                if (dist < 2) {
                    gameState.nearIncense++;
                    if (gameState.nearIncense > 400) endGame("殺虫成分を含んだ煙で中毒死しました");
                } else {
                    gameState.nearIncense = Math.max(0, gameState.nearIncense - 1);
                }
            });

            // Sticky Traps (粘着トラップ)
            for(let i=0; i<8; i++) {
                // Prevent traps from spawning too close to the start position (7, 2, 7)
                let rx, rz;
                do {
                    rx = (Math.random()-0.5)*18;
                    rz = (Math.random()-0.5)*18;
                } while (Math.sqrt(Math.pow(rx-7, 2) + Math.pow(rz-7, 2)) < 3);

                addProp("粘着トラップ", 0xcccc00, new THREE.PlaneGeometry(1, 1), [rx, 0.01, rz], (dist) => {
                    if (gameState.gracePeriod > 0) return;
                    if (dist < 0.6) endGame("粘着シートに捕まり、餓死しました");
                }).rotation.x = -Math.PI/2;
            }
        }

        function addProp(name, color, geometry, pos, updateFn, isTransparent = false) {
            const mat = new THREE.MeshStandardMaterial({ 
                color: color, 
                transparent: isTransparent, 
                opacity: isTransparent ? 0.6 : 1 
            });
            const mesh = new THREE.Mesh(geometry, mat);
            mesh.position.set(...pos);
            mesh.userData = { name, update: updateFn };
            scene.add(mesh);
            props.push(mesh);
            return mesh;
        }

        function updateUI() {
            document.getElementById('timer-val').innerText = Math.floor(gameState.timer);
            
            const thirst = Math.max(0, 100 - (gameState.timer - gameState.lastHydrated) * 2.5);
            document.getElementById('thirst-fill').style.width = thirst + "%";
            
            const hunger = Math.max(0, 100 - (gameState.timer - gameState.lastFed) * 1.1);
            document.getElementById('hunger-fill').style.width = hunger + "%";

            if (gameState.isDrunk > 0) {
                document.getElementById('drunk-status').classList.remove('hidden');
            } else {
                document.getElementById('drunk-status').classList.add('hidden');
            }
        }

        function checkSurvival() {
            if (!gameState.alive) return;

            gameState.timer += 1/60;
            if (gameState.gracePeriod > 0) gameState.gracePeriod--;

            // Life span (2min+)
            if (gameState.timer > 120) {
                if (Math.random() < 0.00025) endGame("寿命を迎えました");
            }

            // Dehydration (40s+)
            if (gameState.timer - gameState.lastHydrated > 40) {
                if (Math.random() < 0.0005) endGame("乾燥して動けなくなりました");
            }

            // Starvation (1min30s+)
            if (gameState.timer - gameState.lastFed > 90) {
                if (Math.random() < 0.001) endGame("エネルギー不足で死亡しました");
            }
        }

        function endGame(reason) {
            if (!gameState.alive || gameState.gracePeriod > 0) return;
            gameState.alive = false;
            gameState.deathReason = reason;
            document.exitPointerLock();

            document.getElementById('game-over').style.display = 'block';
            document.getElementById('death-reason').innerText = reason;
            document.getElementById('final-time').innerText = Math.floor(gameState.timer);
            document.getElementById('props-used').innerText = Array.from(usedProps).join(', ') || "なし";
        }

        function animate() {
            if (!gameState.alive) return;
            requestAnimationFrame(animate);

            // Movement logic
            let speed = gameState.moveSpeed;
            if (gameState.isDrunk > 0) {
                speed *= 1.5;
                gameState.isDrunk--;
            }

            // Rotation
            fly.rotation.y = yaw;
            
            // Vectors
            const direction = new THREE.Vector3();
            if (keys['KeyW'] || keys['ArrowUp']) direction.z -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) direction.z += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) direction.x -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) direction.x += 1;
            
            direction.normalize().applyQuaternion(fly.quaternion);
            fly.position.addScaledVector(direction, speed);

            if (keys['Space']) fly.position.y += speed;
            if (keys['ShiftLeft']) fly.position.y -= speed;

            // Boundaries
            fly.position.x = Math.max(-9.8, Math.min(9.8, fly.position.x));
            fly.position.y = Math.max(0.05, Math.min(7.8, fly.position.y));
            fly.position.z = Math.max(-9.8, Math.min(9.8, fly.position.z));

            // Camera follow
            camera.position.copy(fly.position);
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            // Visual Shake
            if (gameState.isDrunk > 0 || gameState.nearIncense > 0) {
                const intensity = (gameState.isDrunk > 0 ? 0.05 : 0) + (gameState.nearIncense > 100 ? 0.03 : 0);
                camera.position.x += Math.sin(Date.now() * 0.01) * intensity;
                camera.position.y += Math.cos(Date.now() * 0.012) * intensity;
            }

            // Prop Interaction
            props.forEach(p => {
                const dist = fly.position.distanceTo(p.position);
                if (dist < 2) {
                    p.userData.update(dist);
                    if (dist < 1) usedProps.add(p.userData.name);
                }
            });

            checkSurvival();
            updateUI();

            renderer.render(scene, camera);
        }

        window.onload = init;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
