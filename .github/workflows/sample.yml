name: Move Files Up and Remove Directory

on:
  workflow_dispatch: # 手動実行を有効にする場合

jobs:
  move-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gitコミット・プッシュ権限に必要
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Move files and clean up directory
        run: |
          # ターゲットディレクトリの指定（例: files/sample）
          TARGET_DIR="project-A/migrated"
          
          # 1. ターゲットディレクトリが存在するか確認
          if [ -d "$TARGET_DIR" ]; then
            echo "Moving files from $TARGET_DIR to parent directory..."
            
            # 2. 中身のファイルを上の階層（ターゲットの親ディレクトリ）に移動
            mv "$TARGET_DIR"/* ./

            # 3. 空になったディレクトリを削除
            rmdir "$TARGET_DIR"
            
            echo "Successfully removed $TARGET_DIR and moved files."
          else
            echo "Directory $TARGET_DIR does not exist."
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git status
          
          # 変更がある場合のみコミットする
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Move files from files/sample to root and clean up directory"
            git push
          fi
